      ask: "リダイレクト先が適切かご確認ください。「承認」列で OK / 変更 を選択、変更の場合は「コメント」欄に正しいリダイレクト先をお書きください。"
    },
    reviewFields: [
      { key: "confirm", label: "承認", type: "select", options: ["", "OK", "変更", "対応不要"] },
      { key: "comment", label: "コメント", type: "textarea" }

  },
  {

    label: "CWV調査",
    count: 0,
    desc: {

      purpose: "モバイルでのLCP（Largest Contentful Paint）が15.9秒と非常に遅い原因を調査し、改善案をまとめました。",
      howto: "優先度順に改善ポイントを並べています。優先度1〜3だけで5〜8秒程度への短縮が見込めます。",
      ask: "各施策の「承認」列で OK / 保留 / 不要 を選択してください。Cocoonテーマやプラグイン構成に影響するものは慎重にご判断ください。"
    },
    reviewFields: [
      { key: "confirm", label: "承認", type: "select", options: ["", "OK", "保留", "不要"] },
      { key: "comment", label: "コメント", type: "textarea" }

// Store all review data
let reviewData = {};

// Try to load saved data from localStorage
try {
  const saved = localStorage.getItem("seo-review-data");
  if (saved) reviewData = JSON.parse(saved);
} catch(e) {}

// CSV data will be embedded inline
const CSV_DATA = {};

// Parse CSV string
function parseCSV(text) {
  const lines = [];
  let current = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i+1] === '"') { current += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (ch === ',' && !inQuotes) {
      lines.push(current);
      current = "";
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (current || lines.length) { lines.push(current); }
      if (lines.length) {
        if (!parseCSV._result) parseCSV._result = [];
        parseCSV._result.push([...lines]);
        lines.length = 0;
      }
      current = "";
      if (ch === '\r' && text[i+1] === '\n') i++;
    } else {
      current += ch;
    }
  }
  if (current || lines.length) { lines.push(current); parseCSV._result.push([...lines]); }
  const result = parseCSV._result || [];
  parseCSV._result = null;
  return result;
}

function parseCSVText(text) {
  parseCSV._result = null;
  parseCSV(text);
  // Simpler approach
  const rows = [];
  let row = [];
  let cell = "";
  let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i+1] === '"') { cell += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      row.push(cell); cell = "";
    } else if ((c === '\n' || c === '\r') && !inQ) {
      row.push(cell); cell = "";
      if (row.some(x => x)) rows.push(row);
      row = [];
      if (c === '\r' && text[i+1] === '\n') i++;
    } else {
      cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

// Load CSV files via fetch (relative paths on GitHub Pages)
async function loadData() {
  const files = {
    articles: "data/articles.csv",
    cannibalization: "data/cannibalization.csv",
    page2kw: "data/page2kw.csv",
    "internal-links": "data/internal-links.csv",
    "not-indexed": "data/not-indexed.csv",
    errors: "data/errors.csv",
  };

  for (const [key, path] of Object.entries(files)) {
    try {
      const resp = await fetch(path);
      const text = await resp.text();
      const rows = parseCSVText(text);
      CSV_DATA[key] = { headers: rows[0], rows: rows.slice(1) };
      const tab = TABS.find(t => t.id === key);
      if (tab) tab.count = rows.length - 1;
    } catch(e) {
      console.error(`Failed to load ${path}:`, e);
      CSV_DATA[key] = { headers: [], rows: [] };
    }
  }

  // CWV is hardcoded
  CSV_DATA.cwv = {
    headers: ["優先度", "施策", "詳細", "見込み効果", "難易度"],
    rows: [
      ["1", "キャッシュプラグイン導入", "WP Super Cache等を導入。HTMLページキャッシュが一切ない状態", "LCP -3〜5秒", "低"],
      ["2", "画像最適化", "EWWW Image Optimizer導入、既存画像の一括WebP変換（現在WebP率10%）", "LCP -2〜4秒", "低"],
      ["3", "TypeSquare Webフォント無効化", "Xserver Webフォントが外部リソースとしてFOITを引き起こしている", "LCP -1〜2秒", "低"],
      ["4", "Elementorアセット最適化", "75MBのプラグインから大量JS/CSSが全ページで読み込まれる", "LCP -1〜3秒", "中"],
      ["5", "Popup Maker遅延読み込み", "ポップアップ用CSS/JSがレンダリングブロック", "LCP -0.5〜1秒", "低"],
      ["6", "Critical CSS導入", "Cocoon style.css 237KBが非圧縮で<head>に読み込まれている", "LCP -1〜2秒", "中"],
      ["7", "不要プラグイン整理", "jonradio-multiple-themes等を無効化", "LCP -0.5秒", "低"],
    ]
  };
  TABS.find(t => t.id === "cwv").count = 7;

  renderAll();
}

function renderAll() {
  renderTabs();
  renderContents();
  updateProgress();
  // Activate first tab
  document.querySelector(".tab-btn").click();
}

function renderTabs() {
  const container = document.getElementById("tabs");
  container.innerHTML = TABS.map(tab =>
    `<button class="tab-btn" data-tab="${tab.id}">${tab.label}<span class="count-badge">${tab.count}</span></button>`
  ).join("");

  container.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      container.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add("active");
    });
  });
}

function renderContents() {
  const container = document.getElementById("tabContents");
  container.innerHTML = TABS.map(tab => {
    const data = CSV_DATA[tab.id];
    if (!data) return "";

    const desc = `<div class="section-desc">
      <h3>${tab.desc.title}</h3>
      <p><span class="label">目的:</span> ${tab.desc.purpose}</p>
      <p><span class="label">見方:</span> ${tab.desc.howto}</p>
      <p><span class="label">お願い:</span> ${tab.desc.ask}</p>
    </div>`;

    // Build table
    const reviewCols = tab.reviewFields.map(f => `<th class="review-col">${f.label}</th>`).join("");
    const headerRow = data.headers.map(h => `<th>${h}</th>`).join("") + reviewCols;

    const bodyRows = data.rows.map((row, idx) => {
      const dataCells = row.map((cell, ci) => {
        // Style specific columns
        let cls = "";
        if (tab.id === "articles") {
          if (ci === 6 && cell === "あり") return `<td><span class="tag tag-change">あり</span></td>`;
          if (ci === 6 && cell === "なし") return `<td><span class="tag tag-nochange">なし</span></td>`;
          if (ci === 2) return `<td class="url">${cell}</td>`;
        }
        if (tab.id === "cannibalization") {
          if (ci === 0) return `<td class="kw">${cell}</td>`;
          if (ci === 1 || ci === 4) return `<td class="url">${cell}</td>`;
          if (ci === 2 || ci === 5) return `<td class="num">${cell}</td>`;
          if (ci === 3 || ci === 6) return `<td class="num">${cell}</td>`;
        }
        if (tab.id === "page2kw") {
          if (ci === 0) return `<td class="kw">${cell}</td>`;
          if (ci === 1) return `<td class="url">${cell}</td>`;
          if (ci >= 2 && ci <= 5) return `<td class="num">${cell}</td>`;
        }
        if (tab.id === "not-indexed" || tab.id === "errors") {
          if (ci === 0) return `<td class="url">${cell}</td>`;
        }
        return `<td>${cell}</td>`;
      }).join("");

      const reviewCells = tab.reviewFields.map(f => {
        const savedVal = (reviewData[tab.id] && reviewData[tab.id][idx] && reviewData[tab.id][idx][f.key]) || "";
        if (f.type === "select") {
          const opts = f.options.map(o => `<option value="${o}" ${o === savedVal ? "selected" : ""}>${o || "---"}</option>`).join("");
          return `<td class="review-cell"><select data-tab="${tab.id}" data-row="${idx}" data-field="${f.key}" onchange="onReviewChange(this)">${opts}</select></td>`;
        } else {
          return `<td class="review-cell"><textarea data-tab="${tab.id}" data-row="${idx}" data-field="${f.key}" oninput="onReviewChange(this)" placeholder="...">${savedVal}</textarea></td>`;
        }
      }).join("");

      return `<tr>${dataCells}${reviewCells}</tr>`;
    }).join("");

    return `<div class="tab-content" id="tab-${tab.id}">
      ${desc}
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>${headerRow}</tr></thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
      <div class="action-bar">
        <button class="btn btn-secondary" onclick="clearTab('${tab.id}')">このタブをクリア</button>
        <button class="btn btn-primary" onclick="exportData()">レビュー結果を保存</button>
      </div>
    </div>`;
  }).join("");
}

function onReviewChange(el) {
  const { tab, row, field } = el.dataset;
  if (!reviewData[tab]) reviewData[tab] = {};
  if (!reviewData[tab][row]) reviewData[tab][row] = {};
  reviewData[tab][row][field] = el.value;

  // Auto-save to localStorage
  try { localStorage.setItem("seo-review-data", JSON.stringify(reviewData)); } catch(e) {}
  updateProgress();
}

function updateProgress() {
  const bar = document.getElementById("progressBar");
  bar.innerHTML = TABS.map(tab => {
    const data = CSV_DATA[tab.id];
    if (!data) return "";
    const total = data.rows.length;
    const filled = Object.keys(reviewData[tab.id] || {}).filter(k => {
      const entry = reviewData[tab.id][k];
      return Object.values(entry).some(v => v && v.trim());
    }).length;
    const pct = total > 0 ? Math.round(filled / total * 100) : 0;
    const dotClass = pct === 0 ? "dot-none" : pct === 100 ? "dot-done" : "dot-partial";
    return `<div class="progress-item"><span class="progress-dot ${dotClass}"></span>${tab.label} ${filled}/${total}</div>`;
  }).join("");
}

function clearTab(tabId) {
  if (!confirm("このタブの入力内容をクリアしますか？")) return;
  delete reviewData[tabId];
  try { localStorage.setItem("seo-review-data", JSON.stringify(reviewData)); } catch(e) {}
  // Re-render
  renderContents();
  document.querySelector(`.tab-btn[data-tab="${tabId}"]`).click();
  updateProgress();
  showToast("クリアしました");
}

function exportData() {
  // Build export with row context
  const exportObj = {};
  for (const tab of TABS) {
    const data = CSV_DATA[tab.id];
    if (!data || !reviewData[tab.id]) continue;

    const entries = [];
    for (const [rowIdx, fields] of Object.entries(reviewData[tab.id])) {
      if (!Object.values(fields).some(v => v && v.trim())) continue;
      const row = data.rows[parseInt(rowIdx)];
      const context = {};
      data.headers.forEach((h, i) => { context[h] = row[i] || ""; });
      entries.push({ ...context, ...fields });
    }
    if (entries.length > 0) {
      exportObj[tab.id] = entries;
    }
  }

  const json = JSON.stringify(exportObj, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `seo-review_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("レビュー結果をダウンロードしました");
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

// Init
loadData();
</script>
